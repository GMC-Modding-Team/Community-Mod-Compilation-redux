name: Changelog

on:
  pull_request:
    types:
      - closed
  release:
    types:
      - published

  issues:
    types:
      - closed


jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: "✏️ Generate release changelog"
        uses: janheinrichmerker/action-github-changelog-generator@v2.3
        with:
          token: ${{ secrets.WORKFLOW }}
