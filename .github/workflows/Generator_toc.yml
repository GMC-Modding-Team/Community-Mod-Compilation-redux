on:
  push:
    branches:
    - master
    paths:
    - '*.md'
    - '**/*.md'
    - '**/**/*.md'
    - '**/**/**/**/*.md'
    - '**/**/**/**/**/*.md'

name: TOC Generator
jobs:
  generateTOC:
    name: TOC Generator
    runs-on: ubuntu-latest
    steps:
      - uses: technote-space/toc-generator@v4
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
